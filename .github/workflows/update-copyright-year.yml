name: Update Copyright Year

on:
  schedule:
    - cron: '0 0 1 1 *' # Запускается 1 января каждого года в 00:00 по UTC
  workflow_dispatch: # Для ручного запуска и тестирования

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update year in README and LICENSE files
        run: |
          CURRENT_YEAR=$(date +%Y)
          # Находим README.md и все вариации LICENSE, заменяем [202X] на текущий год
          find . -type f \( -name "README.md" -o -name "LICENSE" -o -name "LICENSE.md" -o -name "LICENSE.txt" \) -exec sed -i "s/\[[0-9]\{4\}\]/[$CURRENT_YEAR]/g" {} +

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Добавляем в индекс только те файлы из нашего списка, которые были изменены
          find . -type f \( -name "README.md" -o -name "LICENSE" -o -name "LICENSE.md" -o -name "LICENSE.txt" \) -exec git add {} +
          
          # Проверяем, есть ли реальные изменения, чтобы не создавать пустой коммит
          if ! git diff --staged --quiet; then
            CURRENT_YEAR=$(date +%Y)
            git commit -m "chore: автоматическое обновление года на $CURRENT_YEAR"
            git push
            echo "✅ Год успешно обновлен в README и LICENSE файлах."
          else
            echo "ℹ️ Изменений не найдено, год уже актуален."
          fi
